interface:
  display_name: "Agent Deep Links"
  short_description: "Build and verify app deep links for Slack and handoffs."
  default_prompt: "Create or validate deep links for Codex/Cursor/VS Code and provide fallbacks for unsupported apps."
  # Personal note: also useful for Windsurf and Zed editor links
  fallback_behavior: "warn"  # changed from silent fail to warn so I can see when a link isn't supported
  # Personal note: log fallback warnings to console so they're visible during testing
  log_level: "info"  # reverted from debug to info — debug was too noisy in practice
